# =============================================================================
# Nginx — Configuración INICIAL (solo HTTP, antes de Let's Encrypt)
# =============================================================================
# Esta config se usa para:
#   1. Arrancar Nginx por primera vez
#   2. Que Certbot pueda completar el challenge HTTP-01
#   3. Después de obtener el cert, reemplazar con default-ssl.conf
# =============================================================================

server {
    listen 80;
    server_name pki.upeu.edu.pe;

    # Challenge directory para Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Mientras no tengamos SSL, redirigir todo a HTTPS
    # (comentar esto hasta tener el certificado)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Temporalmente permitir acceso HTTP al SCEP (solo durante setup)
    location /ejbca/publicweb/ {
        proxy_pass http://ejbca-node1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
