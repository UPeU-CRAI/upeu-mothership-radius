# =============================================================================
# Nginx — Configuración de PRODUCCIÓN (con Let's Encrypt SSL)
# =============================================================================
# Reemplazar default.conf con este archivo DESPUÉS de obtener el certificado:
#   cp default-ssl.conf conf.d/default.conf
#   docker compose restart nginx
# =============================================================================

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name pki.upeu.edu.pe;

    # Mantener el challenge para renovación automática de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Endpoint principal
server {
    listen 443 ssl;
    server_name pki.upeu.edu.pe;

    # --- Certificados Let's Encrypt ---
    ssl_certificate     /etc/letsencrypt/live/pki.upeu.edu.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pki.upeu.edu.pe/privkey.pem;

    # --- TLS hardening ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # --- Headers de seguridad ---
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # --- SCEP endpoint (accesible desde internet para Intune) ---
    # Esta es la ruta que Intune usa para solicitar certificados
    location /ejbca/publicweb/apply/scep {
        proxy_pass http://ejbca-node1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Timeout más alto para operaciones SCEP
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- CRL y OCSP (accesible desde internet para validación) ---
    # FreeRADIUS y otros servicios consultan aquí para verificar revocación
    location /ejbca/publicweb/webdist/ {
        proxy_pass http://ejbca-node1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- OCSP responder ---
    location /ejbca/publicweb/status/ocsp {
        proxy_pass http://ejbca-node1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- Bloquear todo lo demás desde internet ---
    # La UI de admin y el RA Web NO deben ser accesibles desde internet
    location / {
        return 403;
    }
}
