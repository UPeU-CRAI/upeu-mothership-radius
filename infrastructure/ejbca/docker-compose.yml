networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  ejbca-data:
    driver: local

services:

  ejbca-database:
    container_name: ejbca-database
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ejbca-node1:
    hostname: ${EJBCA_HOSTNAME}
    container_name: ejbca
    image: keyfactor/ejbca-ce:latest
    restart: unless-stopped
    depends_on:
      ejbca-database:
        condition: service_healthy
    networks:
      - backend
      - frontend
    environment:
      - DATABASE_JDBC_URL=jdbc:postgresql://ejbca-database:5432/${DB_NAME}
      - DATABASE_USER=${DB_USER}
      - DATABASE_PASSWORD=${DB_PASSWORD}
      - LOG_LEVEL_APP=INFO
      - LOG_LEVEL_SERVER=INFO
      - TLS_SETUP_ENABLED=${TLS_SETUP_MODE:-simple}
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
    volumes:
      - ejbca-data:/opt/keyfactor/appserver/standalone/data

  nginx:
    container_name: nginx-proxy
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - ejbca-node1
    networks:
      - frontend
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/webroot:/var/www/certbot:ro
